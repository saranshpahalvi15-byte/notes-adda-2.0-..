<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 350">
  <g transform="translate(20, 30) scale(1.15)">
    <!-- Orange Speech Bubble Tail -->
    <path d="M 150 250 Q 140 280 130 290 Q 150 280 180 255 Z" fill="#F47B20" stroke="#0B3051" stroke-width="10" stroke-linejoin="round"/>

    <!-- Dark Blue Base Layer -->
    <rect x="110" y="80" width="160" height="170" rx="20" fill="#1571B1" stroke="#0B3051" stroke-width="10" />
    <rect x="100" y="70" width="160" height="170" rx="20" fill="#1C9EF1" stroke="#0B3051" stroke-width="10" />

    <!-- Orange background shape -->
    <rect x="120" y="90" width="130" height="140" fill="#F47B20" stroke="#0B3051" stroke-width="10" />

    <!-- White Page -->
    <path d="M 80 80 Q 190 70 260 80 L 240 230 Q 130 260 70 220 Z" fill="#ffffff" stroke="#0B3051" stroke-width="10" stroke-linejoin="round" />
    
    <!-- Rings -->
    <g fill="#AEE1F9" stroke="#0B3051" stroke-width="10">
      <path d="M 90 70 A 15 15 0 1 0 110 55" stroke-linecap="round"/>
      <path d="M 130 70 A 15 15 0 1 0 150 55" stroke-linecap="round"/>
      <path d="M 170 70 A 15 15 0 1 0 190 55" stroke-linecap="round"/>
      <path d="M 210 70 A 15 15 0 1 0 230 55" stroke-linecap="round"/>
    </g>
    <!-- inside of rings -->
    <path d="M 90 65 C 90 50 110 50 110 65" fill="none" stroke="#24a7ef" stroke-width="6"/>
    <path d="M 130 65 C 130 50 150 50 150 65" fill="none" stroke="#24a7ef" stroke-width="6"/>
    <path d="M 170 65 C 170 50 190 50 190 65" fill="none" stroke="#24a7ef" stroke-width="6"/>
    <path d="M 210 65 C 210 50 230 50 230 65" fill="none" stroke="#24a7ef" stroke-width="6"/>
    
    <!-- Thick Checkmark -->
    <path d="M 110 140 L 150 170 L 220 110" fill="none" stroke="#F47B20" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 110 140 L 150 170 L 220 110" fill="none" stroke="#FFBC6A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Green Pencil -->
    <g transform="translate(250, 40) rotate(18)">
      <!-- Wood tip -->
      <path d="M 0 110 L 15 150 L 30 110 Z" fill="#FCE1BE" stroke="#0B3051" stroke-width="10" stroke-linejoin="round"/>
      <!-- Graphite tip -->
      <path d="M 7 130 L 15 150 L 23 130 Z" fill="#0B3051" stroke="#0B3051" stroke-width="2" stroke-linejoin="round"/>
      <!-- Pencil Body -->
      <rect x="0" y="30" width="30" height="80" fill="#69BE40" stroke="#0B3051" stroke-width="10" />
      <line x1="15" y1="30" x2="15" y2="110" stroke="#8ae25d" stroke-width="4" />
      <!-- Metal band -->
      <rect x="0" y="20" width="30" height="10" fill="#DFE6E9" stroke="#0B3051" stroke-width="10" />
      <!-- Eraser -->
      <path d="M 0 10 L 0 20 L 30 20 L 30 10 Q 30 -5 15 -5 Q 0 -5 0 10 Z" fill="#F47B20" stroke="#0B3051" stroke-width="10" />
    </g>
  </g>
  
  <g transform="translate(380, 220)">
    <text font-family="Nunito, 'Arial Rounded MT Bold', sans-serif" font-weight="900" font-size="160" fill="#0B406B">Notes<tspan fill="#F47B20">Adda</tspan></text>
  </g>
</svg>
